<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档刷题 · 一键导入</title>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --color-bg: #f1f5f9;
    --color-surface: #ffffff;
    --color-text: #1e293b;
    --color-text-secondary: #64748b;
    --color-text-muted: #94a3b8;
    --color-border: #e2e8f0;
    --color-primary: #6366f1;
    --color-primary-hover: #4f46e5;
    --color-primary-light: #eef2ff;
    --color-primary-soft: #e0e7ff;
    --color-success: #10b981;
    --color-success-light: #ecfdf5;
    --color-success-soft: #d1fae5;
    --color-error: #ef4444;
    --color-error-light: #fef2f2;
    --color-error-soft: #fee2e2;
    --color-fill: #f59e0b;
    --color-tf: #8b5cf6;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.06), 0 4px 10px rgba(0,0,0,.04);
    --shadow-xl: 0 20px 60px rgba(0,0,0,.12);
    --transition-fast: 150ms cubic-bezier(.4,0,.2,1);
    --transition-normal: 250ms cubic-bezier(.4,0,.2,1);
}

body {
    font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    font-size: 15px; line-height: 1.6;
    display: flex; height: 100vh;
    background: var(--color-bg); color: var(--color-text);
    -webkit-font-smoothing: antialiased;
}

/* ===== 左侧边栏 ===== */
.sidebar {
    width: 280px; background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    display: flex; flex-direction: column;
    padding: 24px 20px; gap: 18px;
    overflow-y: auto; flex-shrink: 0;
}
.sidebar h2 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }

/* 导入区 */
.import-zone {
    border: 2px dashed var(--color-border); border-radius: var(--radius-md);
    padding: 24px 16px 18px; text-align: center; cursor: pointer;
    transition: all var(--transition-normal); background: #f8fafc;
}
.import-zone:hover {
    border-color: var(--color-primary); background: var(--color-primary-light);
    transform: translateY(-1px); box-shadow: var(--shadow-md);
}
.import-zone.dragover { border-color: var(--color-primary); background: var(--color-primary-soft); transform: scale(1.02); }
.import-zone .icon { font-size: 34px; display: block; margin-bottom: 6px; line-height: 1; }
.import-zone p { color: var(--color-text-secondary); font-size: 13px; margin: 0; line-height: 1.7; }
.import-zone input { display: none; }

/* 转换进度 */
.convert-progress {
    display: none; padding: 10px 14px; background: #f8fafc;
    border: 1px solid var(--color-border); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--color-text-secondary);
}
.convert-progress.active { display: flex; align-items: center; gap: 10px; }
.convert-progress .spinner {
    width: 18px; height: 18px; border: 2px solid var(--color-border);
    border-top-color: var(--color-primary); border-radius: 50%;
    animation: spin .6s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 统计区 */
.stat-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #f8fafc; border-radius: var(--radius-sm);
    font-size: 14px; color: var(--color-text-secondary);
}
.stat-item + .stat-item { margin-top: 6px; }
.stat-item .val { font-weight: 700; color: var(--color-primary); font-variant-numeric: tabular-nums; }
.progress-bar {
    width: 100%; height: 6px; background: var(--color-border);
    border-radius: 99px; overflow: hidden; margin-top: 6px;
}
.progress-bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--color-primary), var(--color-primary-hover));
    border-radius: 99px; transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* 控制区 */
.sidebar label {
    font-size: 13px; color: var(--color-text-secondary);
    display: flex; flex-direction: column; gap: 6px; font-weight: 500;
}
.sidebar select {
    width: 100%; padding: 9px 32px 9px 12px; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); font-size: 14px;
    background: var(--color-surface); color: var(--color-text);
    outline: none; cursor: pointer;
    transition: border var(--transition-fast), box-shadow var(--transition-fast);
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center;
}
.sidebar select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }

.sidebar button, .btn-row button, .score-card button {
    width: 100%; padding: 10px 16px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; cursor: pointer; font-weight: 600;
    transition: all var(--transition-fast); letter-spacing: .01em;
}
.sidebar button:active, .btn-row button:active { transform: scale(.97); }

.btn-primary { background: var(--color-primary); color: #fff; box-shadow: 0 1px 3px rgba(99,102,241,.25); }
.btn-primary:hover { background: var(--color-primary-hover); box-shadow: 0 2px 6px rgba(99,102,241,.35); transform: translateY(-1px); }
.btn-secondary { background: #f1f5f9; color: var(--color-text); border: 1px solid var(--color-border); }
.btn-secondary:hover { background: #e2e8f0; border-color: #cbd5e1; }
.btn-danger { background: var(--color-surface); color: var(--color-error); border: 1px solid var(--color-error-soft) !important; }
.btn-danger:hover { background: var(--color-error-light); border-color: var(--color-error) !important; }

/* ===== 右侧主区域 ===== */
.main {
    flex: 1; display: flex; flex-direction: column;
    padding: 48px 40px; overflow-y: auto; align-items: center;
}
.empty-state {
    text-align: center; color: var(--color-text-muted);
    margin-top: 140px; animation: fadeInUp .5s ease-out;
}
.empty-state .icon { font-size: 72px; display: block; margin-bottom: 16px; line-height: 1; }
.empty-state p { font-size: 16px; color: var(--color-text-secondary); }

/* 题目卡片 */
.question-card {
    background: var(--color-surface); border-radius: var(--radius-lg);
    padding: 40px; width: 100%; max-width: 720px;
    box-shadow: var(--shadow-md); border: 1px solid var(--color-border);
    animation: fadeInUp .35s ease-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}

.q-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
}
.q-badge {
    display: inline-flex; align-items: center; padding: 5px 14px;
    border-radius: 99px; font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase; color: #fff;
    background: var(--color-primary); box-shadow: 0 1px 2px rgba(99,102,241,.2);
}
.q-badge.fill { background: var(--color-fill); box-shadow: 0 1px 2px rgba(245,158,11,.2); }
.q-badge.tf { background: var(--color-tf); box-shadow: 0 1px 2px rgba(139,92,246,.2); }
.q-index { color: var(--color-text-muted); font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }

.q-stem {
    font-size: 17px; line-height: 1.75; margin-bottom: 28px;
    color: var(--color-text); font-weight: 450;
}
.q-stem code {
    background: #f1f5f9; color: var(--color-primary);
    padding: 2px 7px; border-radius: 4px; font-size: .9em;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
}

.q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.opt-label {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border: 1.5px solid var(--color-border);
    border-radius: var(--radius-md); cursor: pointer;
    transition: all var(--transition-fast); font-size: 15px;
    color: var(--color-text); user-select: none;
}
.opt-label:hover { border-color: var(--color-primary); background: var(--color-primary-light); transform: translateX(2px); }
.opt-label.selected { border-color: var(--color-primary); background: var(--color-primary-soft); box-shadow: 0 0 0 2px rgba(99,102,241,.12); }
.opt-label.correct { border-color: var(--color-success); background: var(--color-success-light); box-shadow: 0 0 0 2px rgba(16,185,129,.12); color: #065f46; }
.opt-label.wrong { border-color: var(--color-error); background: var(--color-error-light); box-shadow: 0 0 0 2px rgba(239,68,68,.12); color: #991b1b; }
.opt-label input { accent-color: var(--color-primary); width: 18px; height: 18px; flex-shrink: 0; }

.fill-input {
    width: 100%; padding: 14px 18px; border: 1.5px solid var(--color-border);
    border-radius: var(--radius-sm); font-size: 15px; font-family: inherit;
    color: var(--color-text); outline: none; margin-bottom: 28px;
    transition: all var(--transition-fast); background: #fafbfc; resize: vertical;
}
.fill-input:focus { border-color: var(--color-primary); background: var(--color-surface); box-shadow: 0 0 0 3px var(--color-primary-light); }
.fill-input.correct { border-color: var(--color-success); background: var(--color-success-light); box-shadow: 0 0 0 3px rgba(16,185,129,.1); }
.fill-input.wrong { border-color: var(--color-error); background: var(--color-error-light); box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
.fill-input::placeholder { color: var(--color-text-muted); }

.btn-row { display: flex; gap: 12px; justify-content: center; }
.btn-row button { width: auto; min-width: 120px; padding: 12px 32px; border-radius: var(--radius-sm); font-size: 15px; }

.result-box {
    margin-top: 24px; padding: 16px 20px; border-radius: var(--radius-md);
    font-size: 14px; line-height: 1.7; display: none; animation: fadeInUp .25s ease-out;
}
.result-box.show { display: block; }
.result-box.correct { background: var(--color-success-light); border: 1px solid var(--color-success-soft); color: #065f46; }
.result-box.wrong { background: var(--color-error-light); border: 1px solid var(--color-error-soft); color: #991b1b; }

.score-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.5);
    backdrop-filter: blur(4px); display: flex;
    align-items: center; justify-content: center; z-index: 999;
    animation: fadeIn .25s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.score-card {
    background: var(--color-surface); border-radius: var(--radius-xl);
    padding: 48px 40px; text-align: center; min-width: 340px;
    box-shadow: var(--shadow-xl);
    animation: scaleIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scaleIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
.score-card .big-num { font-size: 64px; font-weight: 800; color: var(--color-primary); line-height: 1.1; letter-spacing: -.02em; }
.score-card .sub { color: var(--color-text-secondary); margin: 12px 0 28px; font-size: 15px; }
.score-card button { margin: 6px 0; }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
    body { flex-direction: column; height: auto; min-height: 100vh; }
    .sidebar { width: 100%; padding: 16px 14px; gap: 12px; border-right: none; border-bottom: 1px solid var(--color-border); max-height: none; overflow-y: visible; }
    .sidebar h2 { font-size: 16px; }
    .import-zone { padding: 18px 12px 14px; }
    .import-zone .icon { font-size: 26px; }
    .import-zone p { font-size: 12px; }
    .stat-item { font-size: 13px; padding: 8px 12px; }
    .sidebar select { font-size: 13px; padding: 8px 10px; }
    .sidebar button { padding: 10px; font-size: 14px; }
    .main { flex: 1; padding: 24px 16px; align-items: stretch; }
    .empty-state { margin-top: 60px; }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }
    .question-card { max-width: 100%; padding: 24px 18px; border-radius: var(--radius-md); }
    .q-stem { font-size: 16px; margin-bottom: 20px; }
    .q-badge { font-size: 11px; padding: 4px 10px; }
    .q-index { font-size: 13px; }
    .opt-label { font-size: 14px; padding: 12px 14px; gap: 10px; }
    .opt-label input { width: 16px; height: 16px; }
    .opt-label:hover { transform: none; }
    .fill-input { font-size: 14px; padding: 12px 14px; }
    .btn-row { flex-direction: column; gap: 8px; }
    .btn-row button { width: 100%; padding: 13px; font-size: 15px; }
    .result-box { font-size: 13px; padding: 14px; }
    .score-overlay { align-items: flex-start; padding-top: 60px; }
    .score-card { min-width: 0; width: 90%; max-width: 360px; padding: 36px 24px; }
    .score-card .big-num { font-size: 52px; }
    #questionArea { max-width: 100% !important; }
}

@media (min-width: 769px) and (max-width: 1024px) {
    .sidebar { width: 250px; padding: 20px 16px; gap: 16px; }
    .sidebar h2 { font-size: 16px; }
    .main { padding: 36px 28px; }
    .question-card { max-width: 640px; padding: 32px; }
}

@media (min-width: 1400px) {
    .sidebar { width: 320px; padding: 28px 24px; }
    .question-card { max-width: 780px; padding: 48px; }
    .q-stem { font-size: 18px; }
    .main { padding: 56px 48px; }
}

/* ===== AI 解答按钮 ===== */
.btn-ai {
    width: auto; min-width: 120px; padding: 12px 32px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: .01em;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    color: #fff; border: none;
    box-shadow: 0 1px 3px rgba(99,102,241,.3);
    transition: all var(--transition-fast);
}
.btn-ai:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(99,102,241,.4); }
.btn-ai:active { transform: scale(.97); }
.btn-ai:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== AI 配置面板 ===== */
.ai-config-toggle {
    width: 100%; padding: 10px 16px; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); font-size: 14px; cursor: pointer;
    font-weight: 600; background: #f8fafc; color: var(--color-text-secondary);
    transition: all var(--transition-fast); text-align: center;
}
.ai-config-toggle:hover { border-color: var(--color-primary); background: var(--color-primary-light); color: var(--color-primary); }
.ai-config-panel {
    display: none; flex-direction: column; gap: 10px;
    padding: 14px; border: 1px solid var(--color-border);
    border-radius: var(--radius-md); background: #fafbfc;
    animation: fadeInUp .2s ease-out;
}
.ai-config-panel.show { display: flex; }
.ai-config-panel label {
    font-size: 13px; color: var(--color-text-secondary);
    display: flex; flex-direction: column; gap: 4px; font-weight: 500;
}
.ai-config-panel input, .ai-config-panel select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); font-size: 13px;
    background: var(--color-surface); color: var(--color-text);
    outline: none; transition: border var(--transition-fast);
}
.ai-config-panel input:focus, .ai-config-panel select:focus {
    border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-light);
}
.ai-config-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
.ai-config-row input[type="checkbox"] { width: auto; accent-color: var(--color-primary); }
.ai-config-panel .btn-primary { margin-top: 4px; }

/* ===== AI 弹窗 ===== */
.ai-modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.45);
    backdrop-filter: blur(3px); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .2s ease-out;
}
.ai-modal {
    background: var(--color-surface); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl); display: flex; flex-direction: column;
    width: 580px; height: 560px; min-width: 380px; min-height: 320px;
    max-width: 95vw; max-height: 90vh; overflow: hidden;
    animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1);
}
.ai-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--color-border);
    cursor: move; user-select: none; flex-shrink: 0;
}
.ai-modal-header .title { font-weight: 700; font-size: 15px; color: var(--color-text); }
.ai-modal-header .q-ref { font-size: 12px; color: var(--color-text-muted); margin-left: 10px; }
.ai-modal-header .actions { display: flex; gap: 8px; align-items: center; }
.ai-modal-header .actions button {
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: var(--color-text-muted); padding: 4px 6px; border-radius: 6px;
    transition: all var(--transition-fast); line-height: 1;
}
.ai-modal-header .actions button:hover { background: #f1f5f9; color: var(--color-text); }

.ai-modal-summary {
    padding: 12px 20px; font-size: 13px; color: var(--color-text-secondary);
    background: #f8fafc; border-bottom: 1px solid var(--color-border);
    max-height: 100px; overflow-y: auto; flex-shrink: 0; line-height: 1.6;
}
.ai-modal-summary .label { font-weight: 600; color: var(--color-primary); margin-right: 4px; }

.ai-modal-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
}
.ai-msg {
    max-width: 90%; padding: 12px 16px; border-radius: var(--radius-md);
    font-size: 14px; line-height: 1.7; animation: fadeInUp .2s ease-out;
    word-break: break-word;
}
.ai-msg.assistant { align-self: flex-start; background: #f1f5f9; color: var(--color-text); }
.ai-msg.user { align-self: flex-end; background: var(--color-primary); color: #fff; }
.ai-msg.streaming::after {
    content: '▍'; animation: blink .8s infinite; margin-left: 2px; font-weight: 700;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.ai-msg .label { font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: .7; text-transform: uppercase; letter-spacing: .04em; }
.ai-typing { align-self: flex-start; padding: 8px 16px; display: flex; gap: 4px; }
.ai-typing span { width: 6px; height: 6px; background: var(--color-text-muted); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
.ai-typing span:nth-child(2) { animation-delay: .15s; }
.ai-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.ai-modal-footer {
    display: flex; gap: 10px; padding: 12px 20px;
    border-top: 1px solid var(--color-border); flex-shrink: 0;
}
.ai-modal-footer input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
    color: var(--color-text); outline: none; background: #fafbfc;
    transition: border var(--transition-fast);
}
.ai-modal-footer input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-light); }
.ai-modal-footer input::placeholder { color: var(--color-text-muted); }
.ai-modal-footer button {
    padding: 10px 18px; border: none; border-radius: var(--radius-sm);
    background: var(--color-primary); color: #fff; font-size: 14px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all var(--transition-fast);
}
.ai-modal-footer button:hover { background: var(--color-primary-hover); }
.ai-modal-footer button:disabled { opacity: .5; cursor: not-allowed; }

.ai-resize-handle {
    position: absolute; bottom: 0; right: 0; width: 18px; height: 18px;
    cursor: nwse-resize; z-index: 10;
}

/* 移动端弹窗 */
@media (max-width: 768px) {
    .ai-modal {
        width: 100vw !important; height: 100vh !important;
        max-width: 100vw; max-height: 100vh; border-radius: 0;
        min-width: 0; min-height: 0;
    }
    .ai-modal-header { cursor: default; }
    .ai-modal-header .title { font-size: 14px; }
    .ai-resize-handle { display: none; }
    .ai-modal-summary { max-height: 80px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>📚 文档刷题</h2>

    <div class="import-zone" id="importZone">
        <div class="icon">📂</div>
        <p>拖拽文件到此处<br>或点击选择 · .docx .pdf .doc .md</p>
        <input type="file" id="fileInput" accept=".docx,.pdf,.doc,.md,text/plain,text/markdown,text/*">
    </div>

    <div class="convert-progress" id="convertProgress">
        <div class="spinner"></div>
        <span id="convertStatus">正在转换文档...</span>
    </div>

    <div id="statsPanel" style="display:none;">
        <div class="stat-item"><span>题库</span><span class="val" id="statTitle">-</span></div>
        <div class="stat-item"><span>进度</span><span class="val" id="statProgress">-</span></div>
        <div class="stat-item"><span>正确率</span><span class="val" id="statAccuracy">-</span></div>
        <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div id="ctrlPanel" style="display:none;">
        <label>刷题模式
            <select id="modeSelect">
                <option value="sequential">顺序刷题</option>
                <option value="random">随机刷题</option>
            </select>
        </label>
        <button class="btn-danger" id="btnWrongBook">错题重刷 (0)</button>
        <button class="btn-secondary" id="btnReset">重置当前进度</button>
        <button class="btn-primary" id="btnStart">开始刷题</button>
    </div>

    <button class="ai-config-toggle" id="aiConfigToggle">⚙️ AI 解答设置</button>
    <div class="ai-config-panel" id="aiConfigPanel">
        <label>接口模式
            <select id="aiMode">
                <option value="api">API 直连</option>
                <option value="local">本地模型 (Ollama)</option>
                <option value="proxy">自定义代理</option>
            </select>
        </label>
        <label>API 地址
            <input type="text" id="aiBaseURL" placeholder="https://api.openai.com/v1">
        </label>
        <label>API Key
            <input type="password" id="aiKey" placeholder="sk-...">
        </label>
        <label>模型名称
            <input type="text" id="aiModel" placeholder="gpt-4o-mini">
        </label>
        <div class="ai-config-row">
            <input type="checkbox" id="aiRemember"> 记住配置
        </div>
        <button class="btn-primary" id="aiSaveConfig">保存配置</button>
    </div>
</div>

<div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
        <div class="icon">📝</div>
        <p>导入 docx / pdf / doc / md 题库文件开始刷题</p>
    </div>
    <div id="questionArea" style="display:none; width:100%; max-width:720px;"></div>
</div>

<script>
const importZone = document.getElementById('importZone');
const fileInput = document.getElementById('fileInput');
const emptyState = document.getElementById('emptyState');
const questionArea = document.getElementById('questionArea');
const statsPanel = document.getElementById('statsPanel');
const ctrlPanel = document.getElementById('ctrlPanel');
const modeSelect = document.getElementById('modeSelect');
const btnWrongBook = document.getElementById('btnWrongBook');
const btnReset = document.getElementById('btnReset');
const btnStart = document.getElementById('btnStart');
const convertProgress = document.getElementById('convertProgress');
const convertStatus = document.getElementById('convertStatus');

// PDF.js worker
if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}

let bank = null;
let currentBankId = '';
let order = [];
let orderIdx = 0;
let answered = false;
let record = {};
let wrongMode = false;

// ==================== 文档转文本 ====================
async function docxToText(file) {
    if (typeof mammoth === 'undefined') throw new Error('mammoth.js 未加载');
    const buf = await file.arrayBuffer();
    const result = await mammoth.convertToMarkdown({ arrayBuffer: buf });
    let md = result.value || '';
    md = md.replace(/\\(\.)/g, '$1');
    return md;
}

async function pdfToText(file) {
    if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js 未加载');
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        const t = tc.items.map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
        if (t) pages.push(t);
    }
    return pages.join('\n\n') || '';
}

async function convertDocument(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    convertProgress.classList.add('active');
    convertStatus.textContent = '正在转换 ' + file.name + '...';

    let text;
    if (ext === 'docx' || ext === 'doc') {
        text = await docxToText(file);
    } else if (ext === 'pdf') {
        text = await pdfToText(file);
    } else {
        throw new Error('不支持的文件格式');
    }

    convertProgress.classList.remove('active');
    return text;
}

// ==================== Markdown 解析 ====================
function parseMarkdown(text) {
    const lines = text.split(/\r?\n/);
    const questions = [];
    let current = null;
    let pendingAnswer = '';
    let pendingAnalysis = '';
    let pendingTags = '';

    function flush() {
        if (!current) return;
        if (!current.options.length && current.essayAnswer) {
            current.type = 'essay'; current.answer = [current.essayAnswer];
            current.analysis = pendingAnalysis.trim();
            current.tags = pendingTags.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            questions.push(current); current = null; pendingAnswer = ''; pendingAnalysis = ''; pendingTags = ''; return;
        }
        if (!current.options.length && pendingAnswer.trim() && !/^[A-Ea-e]$/.test(pendingAnswer.trim()) && !/^[A-Ea-e]+$/.test(pendingAnswer.trim())) {
            current.type = 'essay'; current.answer = [pendingAnswer.trim()];
            current.analysis = pendingAnalysis.trim();
            current.tags = pendingTags.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            questions.push(current); current = null; pendingAnswer = ''; pendingAnalysis = ''; pendingTags = ''; return;
        }
        if (!current.options.length) { current = null; return; }
        if (current.options.length === 2 &&
            (current.options[0].includes('正确') || current.options[0].includes('对') ||
             current.options[0].includes('True') || current.options[0].includes('true')) &&
            (current.options[1].includes('错误') || current.options[1].includes('错') ||
             current.options[1].includes('False') || current.options[1].includes('false'))) {
            current.type = 'truefalse';
            current.answer = pendingAnswer.trim() === '正确' || pendingAnswer.trim() === '对' ||
                             pendingAnswer.trim().toLowerCase() === 'true' ? [0] : [1];
        } else {
            const ansStr = pendingAnswer.trim();
            if (ansStr.length === 1 && /[A-E]/.test(ansStr)) { current.type = 'single'; current.answer = [ansStr.charCodeAt(0) - 65]; }
            else if (/^[A-E]+$/.test(ansStr) && ansStr.length > 1) { current.type = 'multi'; current.answer = ansStr.split('').map(c => c.charCodeAt(0) - 65); }
            else if (ansStr) { current.type = 'fill'; current.answer = [ansStr]; }
            else { current.type = 'single'; current.answer = []; }
        }
        current.analysis = pendingAnalysis.trim();
        current.tags = pendingTags.split(/[,，]/).map(s => s.trim()).filter(Boolean);
        questions.push(current); current = null; pendingAnswer = ''; pendingAnalysis = ''; pendingTags = '';
    }

    for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;

        let qMatch = trimmed.match(/^(\d+)[\.、．](.+)/);
        if (qMatch) { flush(); current = { id: parseInt(qMatch[1]), stem: qMatch[2], options: [], isFill: false }; continue; }
        if (!current) continue;

        const ansMatch = trimmed.match(/^(?:正确)?答?案\s*(?:是|为)?[：:∶]\s*(.+)/);
        if (ansMatch) { pendingAnswer = ansMatch[1].trim(); continue; }
        const ansTight2 = trimmed.match(/^(?:正确)?答案\s*(?:是|为)\s*([A-E]+)\s*$/);
        if (ansTight2) { pendingAnswer = ansTight2[1]; continue; }
        const ansTight = trimmed.match(/^(?:正确)?答案\s*([A-Ea-e]+)\s*$/);
        if (ansTight) { pendingAnswer = ansTight[1].toUpperCase(); continue; }
        if (trimmed.startsWith('[答案]')) { pendingAnswer = trimmed.replace('[答案]', '').trim(); continue; }
        if (trimmed.startsWith('[解析]')) { pendingAnalysis = trimmed.replace('[解析]', '').trim(); continue; }
        if (trimmed.startsWith('[标签]')) { pendingTags = trimmed.replace('[标签]', '').trim(); continue; }
        const essayMatch = trimmed.match(/^答\s*[：:]\s*(.+)/);
        if (essayMatch) { current.essayAnswer = essayMatch[1].trim(); continue; }

        if (trimmed.match(/^[A-E]/)) {
            const parts = trimmed.split(/(?=[A-E](?:[\.、\s]|[^\x00-\x7f]))/).filter(s => s.trim());
            if (parts.length >= 2) {
                const letters = parts.map(p => p.trim().charAt(0));
                const isSequential = letters.every((c, i) => 'ABCDE'.includes(c) && (i === 0 || 'ABCDE'.indexOf(c) > 'ABCDE'.indexOf(letters[i - 1])));
                if (isSequential) {
                    for (const part of parts) {
                        const m = part.trim().match(/^([A-E])[\.、\s]*(.+)/);
                        if (m) current.options.push(m[1] + '. ' + m[2]);
                        else { const m2 = part.trim().match(/^([A-E])([^\x00-\x7f].*)/); if (m2) current.options.push(m2[1] + '. ' + m2[2]); }
                    }
                    continue;
                }
            }
        }
        let optMatch = trimmed.match(/^([A-E])[\.、\s]+(.+)/);
        if (optMatch) { current.options.push(optMatch[1] + '. ' + optMatch[2]); continue; }
        let optTight = trimmed.match(/^([A-E])(\S.*)/);
        if (optTight) { current.options.push(optTight[1] + '. ' + optTight[2]); continue; }
        current.stem += '\n' + trimmed;
    }
    flush();
    return questions;
}

// ==================== localStorage ====================
function storageKey() { return 'doc_quiz_' + currentBankId; }
function saveRecord() {
    if (!currentBankId) return;
    const data = { answeredCount: record.answeredCount, correctCount: record.correctCount, wrongSet: Array.from(record.wrongSet), answers: record.answers };
    localStorage.setItem(storageKey(), JSON.stringify(data));
    localStorage.setItem('doc_quiz_bank_' + currentBankId, JSON.stringify({ title: bank.title, questions: bank.questions }));
}
function loadRecord() {
    const raw = localStorage.getItem(storageKey());
    if (raw) {
        const data = JSON.parse(raw);
        record = { answeredCount: record.answeredCount || 0, correctCount: data.correctCount || 0, wrongSet: new Set(data.wrongSet || []), answers: data.answers || {} };
    } else {
        record = { answeredCount: 0, correctCount: 0, wrongSet: new Set(), answers: {} };
    }
}

// ==================== 初始化题库 ====================
function initBank(questions, title) {
    bank = { title: title || '题库', questions };
    currentBankId = title + '_' + questions.length;
    loadRecord();
    buildOrder();
    updateStats();
    statsPanel.style.display = 'block';
    ctrlPanel.style.display = 'block';
    emptyState.style.display = 'none';
    document.getElementById('statTitle').textContent = title || '题库';
}

function buildOrder() {
    if (wrongMode) { order = Array.from(record.wrongSet); }
    else { order = bank.questions.map((_, i) => i); }
    if (modeSelect.value === 'random') shuffle(order);
    orderIdx = 0;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function updateStats() {
    const total = bank.questions.length;
    const done = record.answeredCount;
    document.getElementById('statProgress').textContent = done + ' / ' + total;
    const pct = done > 0 ? Math.round(record.correctCount / done * 100) : 0;
    document.getElementById('statAccuracy').textContent = pct + '%';
    document.getElementById('progressFill').style.width = (done / total * 100) + '%';
    var btnWB = document.getElementById('btnWrongBook');
    if (btnWB) btnWB.textContent = btnWB.textContent.replace(/\d+/, record.wrongSet.size);
    saveRecord();
}

// ==================== 渲染题目 ====================
function renderQuestion(qIdx) {
    if (orderIdx >= order.length) { showScore(); return; }
    const q = bank.questions[qIdx];
    answered = false;

    let html = '<div class="question-card">';
    html += '<div class="q-header">';
    const typeLabel = q.type === 'essay' ? '简答' : q.type === 'fill' ? '填空' : q.type === 'truefalse' ? '判断' : q.type === 'multi' ? '多选' : '单选';
    html += '<span class="q-badge ' + (q.type === 'essay' ? 'fill' : q.type === 'fill' ? 'fill' : q.type === 'truefalse' ? 'tf' : '') + '">' + typeLabel + '</span>';
    html += '<span class="q-index">第 ' + (orderIdx + 1) + ' / ' + order.length + ' 题</span>';
    html += '</div>';

    let stem = q.stem;
    stem = stem.replace(/`([^`]+)`/g, '<code>$1</code>');
    stem = stem.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    stem = stem.replace(/\n/g, '<br>');
    html += '<div class="q-stem">' + stem + '</div>';

    const userAnswer = record.answers[q.id];

    if (q.type === 'essay') {
        html += '<textarea class="fill-input" id="fillInput" placeholder="输入你的答案..." style="min-height:120px;resize:vertical;">' + (userAnswer || '') + '</textarea>';
    } else if (q.type === 'fill') {
        html += '<input type="text" class="fill-input" id="fillInput" placeholder="输入答案" value="' + (userAnswer || '') + '">';
    } else if (q.type === 'truefalse') {
        html += '<div class="q-options">';
        ['正确', '错误'].forEach((opt, i) => {
            const sel = userAnswer !== undefined && userAnswer == i;
            html += '<label class="opt-label' + (sel ? ' selected' : '') + '" data-idx="' + i + '"><input type="radio" name="opt" value="' + i + '" ' + (sel ? 'checked' : '') + '> ' + opt + '</label>';
        });
        html += '</div>';
    } else if (q.type === 'multi') {
        html += '<div class="q-options">';
        q.options.forEach((opt, i) => {
            const sel = userAnswer && userAnswer.includes(i);
            html += '<label class="opt-label' + (sel ? ' selected' : '') + '" data-idx="' + i + '"><input type="checkbox" name="opt" value="' + i + '" ' + (sel ? 'checked' : '') + '> ' + opt + '</label>';
        });
        html += '</div>';
    } else {
        html += '<div class="q-options">';
        q.options.forEach((opt, i) => {
            const sel = userAnswer !== undefined && userAnswer == i;
            html += '<label class="opt-label' + (sel ? ' selected' : '') + '" data-idx="' + i + '"><input type="radio" name="opt" value="' + i + '" ' + (sel ? 'checked' : '') + '> ' + opt + '</label>';
        });
        html += '</div>';
    }

    html += '<div class="result-box" id="resultBox"></div>';
    html += '<div class="btn-row">';
    html += '<button class="btn-primary" id="btnSubmit">提交答案</button>';
    html += '<button class="btn-secondary" id="btnNext" style="display:none;">下一题 →</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:10px;"><button class="btn-ai" id="btnAI"' + (isAIConfigured() ? '' : ' disabled') + '>🤖 AI 解答</button></div>';
    html += '</div>';

    questionArea.innerHTML = html;
    questionArea.style.display = 'block';
    answered = false;
    bindCardEvents(q);
}

let keyHandler = null;
function bindCardEvents(q) {
    const labels = questionArea.querySelectorAll('.opt-label');
    labels.forEach(l => {
        l.addEventListener('click', function() {
            if (answered) return;
            const input = this.querySelector('input');
            if (input.type === 'radio') { labels.forEach(ll => ll.classList.remove('selected')); this.classList.add('selected'); }
            else if (input.type === 'checkbox') { input.checked = !input.checked; this.classList.toggle('selected', input.checked); }
        });
    });

    const btnSubmit = document.getElementById('btnSubmit');
    const btnNext = document.getElementById('btnNext');

    btnSubmit.addEventListener('click', () => {
        if (btnSubmit.disabled) return;
        btnSubmit.disabled = true;
        if (!submitAnswer(q)) { btnSubmit.disabled = false; return; }
        btnSubmit.style.display = 'none';
        btnNext.style.display = 'inline-block';
    });
    btnNext.addEventListener('click', () => {
        orderIdx++;
        if (orderIdx >= order.length) { showScore(); }
        else { renderQuestion(order[orderIdx]); }
    });

    document.removeEventListener('keydown', keyHandler);
    keyHandler = function(e) {
        if (e.key === 'Enter' && !btnSubmit.disabled && btnSubmit.style.display !== 'none') { btnSubmit.click(); }
        else if (e.key === 'Enter' && btnSubmit.style.display === 'none') { btnNext.click(); }
        else if (e.key === 'ArrowRight' && btnSubmit.style.display === 'none') { btnNext.click(); }
    };
    document.addEventListener('keydown', keyHandler);

    const btnAI = document.getElementById('btnAI');
    if (btnAI) {
        btnAI.addEventListener('click', () => {
            if (!isAIConfigured()) { alert('请先在侧边栏配置 AI 接口'); return; }
            openAIModal(q);
        });
    }
}

function submitAnswer(q) {
    try {
        let userAnswer;
        if (q.type === 'essay') {
            userAnswer = [document.getElementById('fillInput').value.trim()];
            if (!userAnswer[0]) return false;
            document.getElementById('fillInput').disabled = true;
        } else if (q.type === 'fill') {
            userAnswer = [document.getElementById('fillInput').value.trim()];
            if (!userAnswer[0]) return false;
            document.getElementById('fillInput').disabled = true;
        } else if (q.type === 'multi') {
            const checks = questionArea.querySelectorAll('input[type="checkbox"]:checked');
            if (checks.length === 0) return false;
            userAnswer = Array.from(checks).map(c => parseInt(c.value));
        } else {
            const radio = questionArea.querySelector('input[type="radio"]:checked');
            if (!radio) return false;
            userAnswer = [parseInt(radio.value)];
        }
        answered = true;
        const isCorrect = checkAnswer(q, userAnswer);

        record.answeredCount++;
        if (isCorrect) { record.correctCount++; record.wrongSet.delete(order[orderIdx]); }
        else { record.wrongSet.add(order[orderIdx]); }
        record.answers[q.id] = q.type === 'multi' ? userAnswer : userAnswer[0];

        if (q.type === 'essay' || q.type === 'fill') {
            const inp = document.getElementById('fillInput');
            inp.classList.add(isCorrect ? 'correct' : 'wrong');
        } else if (q.answer.length === 0) {
            const labels = questionArea.querySelectorAll('.opt-label');
            labels.forEach(l => { const idx = parseInt(l.dataset.idx); if (userAnswer.includes(idx)) l.classList.add('correct'); });
        } else {
            const labels = questionArea.querySelectorAll('.opt-label');
            labels.forEach(l => {
                const idx = parseInt(l.dataset.idx);
                if (q.answer.includes(idx)) l.classList.add('correct');
                if (userAnswer.includes(idx) && !q.answer.includes(idx)) l.classList.add('wrong');
            });
        }

        const resultBox = document.getElementById('resultBox');
        resultBox.classList.add('show', isCorrect ? 'correct' : 'wrong');
        if (q.type === 'essay') {
            resultBox.innerHTML = '📝 参考答案：<br>' + q.answer[0].replace(/\n/g, '<br>') + (q.analysis ? '<br><br>解析：' + q.analysis : '');
        } else if (isCorrect) {
            resultBox.innerHTML = '✅ 回答正确！' + (q.analysis ? '<br>解析：' + q.analysis : '');
        } else {
            const correctStr = q.type === 'fill' ? q.answer[0] : q.answer.map(i => q.options[i] || i).join('、');
            resultBox.innerHTML = '❌ 回答错误，正确答案：' + correctStr + (q.analysis ? '<br>解析：' + q.analysis : '');
        }
        updateStats();
        return true;
    } catch(e) {
        const resultBox = document.getElementById('resultBox');
        if (resultBox) { resultBox.innerHTML = '出错了：' + e.message; resultBox.classList.add('show', 'wrong'); }
        return false;
    }
}

function checkAnswer(q, userAnswer) {
    if (q.type === 'essay' || q.answer.length === 0) return true;
    if (q.type === 'fill') return q.answer.some(a => userAnswer[0].toLowerCase() === a.toLowerCase());
    if (q.type === 'multi') {
        const su = [...userAnswer].sort(), sc = [...q.answer].sort();
        return su.length === sc.length && su.every((v, i) => v === sc[i]);
    }
    return userAnswer[0] === q.answer[0];
}

function showScore() {
    const total = order.length;
    const correct = order.filter(idx => record.wrongSet.has(idx) === false && record.answers[bank.questions[idx].id] !== undefined).length;
    const pct = total > 0 ? Math.round(correct / total * 100) : 0;

    emptyState.style.display = 'block';
    questionArea.style.display = 'none';
    emptyState.innerHTML = `
        <div class="score-overlay">
            <div class="score-card">
                <p style="color:#64748b;font-size:14px;margin-bottom:4px;">${wrongMode ? '错题重刷' : '刷题'}完成</p>
                <div class="big-num">${pct}%</div>
                <div class="sub">${correct} / ${total} 正确</div>
                <button class="btn-primary" id="btnReviewWrong" style="margin:6px;">错题重刷 (${record.wrongSet.size}题)</button>
                <button class="btn-secondary" id="btnBackToAll" style="margin:6px;">返回全部题库</button>
            </div>
        </div>
    `;
    document.getElementById('btnReviewWrong').addEventListener('click', () => {
        wrongMode = true; buildOrder();
        document.getElementById('btnWrongBook').textContent = '错题重刷 (' + record.wrongSet.size + ')';
        if (order.length === 0) { alert('没有错题！'); wrongMode = false; buildOrder(); return; }
        answered = false; emptyState.style.display = 'none'; renderQuestion(order[0]);
    });
    document.getElementById('btnBackToAll').addEventListener('click', () => {
        wrongMode = false; buildOrder(); answered = false;
        emptyState.style.display = 'none'; renderQuestion(order[0]);
    });
}

// ==================== 文件处理 ====================
importZone.addEventListener('click', () => fileInput.click());
importZone.addEventListener('dragover', e => { e.preventDefault(); importZone.classList.add('dragover'); });
importZone.addEventListener('dragleave', () => importZone.classList.remove('dragover'));
importZone.addEventListener('drop', e => {
    e.preventDefault(); importZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
});
fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) processFile(file);
    fileInput.value = '';
});

async function processFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    let title = file.name.replace(/\.[^.]+$/, '');
    let text;

    try {
        if (ext === 'md') {
            // 直接读取
            text = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        } else if (ext === 'docx' || ext === 'doc' || ext === 'pdf') {
            // 先转换为文本
            text = await convertDocument(file);
            if (!text || !text.trim()) {
                alert('未能从文档中提取文本内容，可能是扫描件或图片型 PDF');
                return;
            }
        } else {
            alert('不支持的文件格式，请导入 .docx / .pdf / .doc / .md 文件');
            return;
        }

        const questions = parseMarkdown(text);
        if (questions.length === 0) {
            alert('未识别到题目。请确保文档格式为：数字+题干、选项 A. B. C. D.、答案：X、[解析]（可选）');
            return;
        }

        initBank(questions, title);
    } catch (err) {
        console.error(err);
        convertProgress.classList.remove('active');
        alert('处理失败：' + err.message);
    }
}

// ==================== 控制按钮 ====================
btnStart.addEventListener('click', () => {
    if (!bank) { alert('请先导入题库'); return; }
    wrongMode = false; buildOrder(); orderIdx = 0; answered = false;
    emptyState.style.display = 'none'; renderQuestion(order[0]);
});

btnWrongBook.addEventListener('click', () => {
    if (!bank) return;
    wrongMode = !wrongMode;
    if (wrongMode) {
        order = Array.from(record.wrongSet);
        if (order.length === 0) { alert('没有错题！'); wrongMode = false; return; }
        btnWrongBook.textContent = '返回全部题库';
        btnWrongBook.classList.remove('btn-danger');
        btnWrongBook.classList.add('btn-primary');
    } else {
        buildOrder();
        btnWrongBook.textContent = '错题重刷 (' + record.wrongSet.size + ')';
        btnWrongBook.classList.add('btn-danger');
        btnWrongBook.classList.remove('btn-primary');
    }
    orderIdx = 0; emptyState.style.display = 'none'; renderQuestion(order[0]);
});

modeSelect.addEventListener('change', () => {
    if (!bank) return;
    if (orderIdx > 0) { if (!confirm('切换模式将重置当前进度，确定？')) { modeSelect.value = modeSelect.value === 'random' ? 'sequential' : 'random'; return; } }
    wrongMode = false; buildOrder(); orderIdx = 0;
    questionArea.style.display = 'none'; emptyState.style.display = 'block';
    document.getElementById('btnWrongBook').textContent = '错题重刷 (' + record.wrongSet.size + ')';
    document.getElementById('btnWrongBook').classList.add('btn-danger');
    document.getElementById('btnWrongBook').classList.remove('btn-primary');
});

btnReset.addEventListener('click', () => {
    if (!bank) return;
    if (!confirm('确定要重置当前题库的所有做题记录吗？')) return;
    record = { answeredCount: 0, correctCount: 0, wrongSet: new Set(), answers: {} };
    saveRecord(); wrongMode = false; buildOrder(); orderIdx = 0; updateStats();
    questionArea.style.display = 'none'; emptyState.style.display = 'block';
    document.getElementById('btnWrongBook').textContent = '错题重刷 (0)';
    document.getElementById('btnWrongBook').classList.add('btn-danger');
    document.getElementById('btnWrongBook').classList.remove('btn-primary');
});

// ==================== AI 配置管理 ====================
const AI_CONFIG_KEY = 'doc_quiz_ai_config';
let aiConfig = { mode: 'api', baseURL: '', key: '', model: '' };

function loadAIConfig() {
    try {
        const raw = localStorage.getItem(AI_CONFIG_KEY);
        if (raw) { aiConfig = JSON.parse(raw); return; }
    } catch (e) {}
    const sess = sessionStorage.getItem(AI_CONFIG_KEY);
    if (sess) { try { aiConfig = JSON.parse(sess); } catch (e) {} }
}
function saveAIConfig() {
    if (document.getElementById('aiRemember').checked) {
        localStorage.setItem(AI_CONFIG_KEY, JSON.stringify(aiConfig));
        sessionStorage.removeItem(AI_CONFIG_KEY);
    } else {
        localStorage.removeItem(AI_CONFIG_KEY);
        sessionStorage.setItem(AI_CONFIG_KEY, JSON.stringify(aiConfig));
    }
}
function isAIConfigured() {
    return !!(aiConfig.baseURL && aiConfig.key && aiConfig.model);
}

loadAIConfig();
const aiMode = document.getElementById('aiMode');
const aiBaseURL = document.getElementById('aiBaseURL');
const aiKey = document.getElementById('aiKey');
const aiModel = document.getElementById('aiModel');
const aiRemember = document.getElementById('aiRemember');

function populateAIConfigUI() {
    // 默认使用 DeepSeek V4 Flash
    aiMode.value = aiConfig.mode || 'api';
    aiBaseURL.value = aiConfig.baseURL || '';
    aiKey.value = aiConfig.key || '';
    aiModel.value = aiConfig.model || '';
    aiRemember.checked = !!localStorage.getItem(AI_CONFIG_KEY);
}
populateAIConfigUI();

aiMode.addEventListener('change', () => {
    const m = aiMode.value;
    if (m === 'local') {
        aiBaseURL.placeholder = 'http://localhost:11434/v1';
        aiKey.placeholder = 'ollama（可不填）';
        aiKey.value = 'ollama';
        aiModel.placeholder = 'qwen2.5:7b';
    } else if (m === 'proxy') {
        aiBaseURL.placeholder = 'https://your-proxy.com/chat';
        aiKey.placeholder = '自定义 Token（可选）';
        aiModel.placeholder = 'default';
    } else {
        aiBaseURL.placeholder = 'https://api.openai.com/v1';
        aiKey.placeholder = 'sk-...';
        aiModel.placeholder = 'gpt-4o-mini';
        aiKey.value = '';
    }
});

document.getElementById('aiConfigToggle').addEventListener('click', () => {
    document.getElementById('aiConfigPanel').classList.toggle('show');
});

document.getElementById('aiSaveConfig').addEventListener('click', () => {
    aiConfig.mode = aiMode.value;
    aiConfig.baseURL = aiBaseURL.value.trim().replace(/\/+$/, '');
    aiConfig.key = aiKey.value.trim();
    aiConfig.model = aiModel.value.trim();
    if (!aiConfig.baseURL) { alert('请填写 API 地址'); return; }
    if (!aiConfig.model) { alert('请填写模型名称'); return; }
    saveAIConfig();
    document.getElementById('aiConfigPanel').classList.remove('show');
    alert('AI 配置已保存');
});

// ==================== AI 弹窗 ====================
let aiModalEl = null;
let aiChatHistory = []; // { role: 'user'|'assistant', content: '' }
let aiCurrentQ = null;
let aiAbortCtrl = null;

function buildAISystemPrompt(q) {
    const userAns = record.answers[q.id];
    let userAnsStr = '未作答';
    if (userAns !== undefined) {
        if (q.type === 'multi') userAnsStr = userAns.map(i => q.options[i] || String.fromCharCode(65+i)).join('');
        else if (q.type === 'fill' || q.type === 'essay') userAnsStr = String(userAns);
        else if (q.type === 'truefalse') userAnsStr = userAns === 0 ? '正确' : '错误';
        else userAnsStr = q.options[userAns] || String.fromCharCode(65+userAns);
    }
    const correctAns = q.answer.length ? (q.type === 'fill' || q.type === 'essay' ? q.answer[0] : q.answer.map(i => q.options[i] || String.fromCharCode(65+i)).join('')) : '无';
    const typeMap = { single: '单选题', multi: '多选题', fill: '填空题', truefalse: '判断题', essay: '简答题' };

    let opts = '';
    if (q.options.length) {
        opts = q.options.map((o, i) => String.fromCharCode(65+i) + '. ' + o.replace(/^[A-E]\.\s*/, '')).join('\n');
    }

    return `你是一个专业的刷题辅导助手。用户正在做一道${typeMap[q.type] || '题目'}，请帮助解答。
题目：${q.stem.replace(/\n/g, ' ')}
${opts ? '选项：\n' + opts + '\n' : ''}正确答案：${correctAns}
用户答案：${userAnsStr}
现有解析：${q.analysis || '无'}

请按以下结构回答：
1. **逐选项分析**：对每个选项判断对错并解释原因
2. **最终答案**：明确给出正确答案
3. **要点总结**：提炼本题核心知识点
${q.type === 'essay' ? '注意：这是简答题，侧重解读参考答案并评估用户答案的优劣，而非判断对错。' : ''}`;
}

function buildQuestionSummary(q) {
    let s = '<span class="label">题干：</span>' + (q.stem.length > 80 ? q.stem.substring(0, 80) + '...' : q.stem);
    if (q.options.length) {
        s += ' <span class="label">选项：</span>' + q.options.map(o => o.replace(/^[A-E]\.\s*/, '').substring(0, 30)).join(' | ');
    }
    return s;
}

function openAIModal(q) {
    if (aiModalEl) { closeAIModal(); }
    aiCurrentQ = q;
    aiChatHistory = [];

    const overlay = document.createElement('div');
    overlay.className = 'ai-modal-overlay';
    overlay.innerHTML = `
        <div class="ai-modal">
            <div class="ai-modal-header" id="aiModalHeader">
                <div><span class="title">🤖 AI 解答</span><span class="q-ref">第 ${orderIdx+1} 题</span></div>
                <div class="actions">
                    <button id="aiNewChat" title="新建对话">🔄</button>
                    <button id="aiClose" title="关闭">✕</button>
                </div>
            </div>
            <div class="ai-modal-summary">${buildQuestionSummary(q)}</div>
            <div class="ai-modal-body" id="aiModalBody"></div>
            <div class="ai-modal-footer">
                <input type="text" id="aiInput" placeholder="追问...（Enter 发送）">
                <button id="aiSend">发送</button>
            </div>
            <div class="ai-resize-handle" id="aiResizeHandle"></div>
        </div>
    `;
    document.body.appendChild(overlay);
    aiModalEl = overlay;

    // 拖拽
    const modal = overlay.querySelector('.ai-modal');
    const header = overlay.querySelector('#aiModalHeader');
    let drag = false, dx = 0, dy = 0;
    header.addEventListener('pointerdown', e => {
        drag = true; dx = e.clientX - modal.getBoundingClientRect().left; dy = e.clientY - modal.getBoundingClientRect().top;
        modal.style.transition = 'none';
        e.preventDefault();
    });
    document.addEventListener('pointermove', e => {
        if (!drag) return;
        const x = e.clientX - dx, y = e.clientY - dy;
        modal.style.position = 'fixed'; modal.style.left = x + 'px'; modal.style.top = y + 'px';
    });
    document.addEventListener('pointerup', () => { drag = false; modal.style.transition = ''; });

    // resize
    const handle = overlay.querySelector('#aiResizeHandle');
    let resizing = false, rw = 0, rh = 0, rx = 0, ry = 0;
    handle.addEventListener('pointerdown', e => {
        resizing = true;
        const r = modal.getBoundingClientRect();
        rw = r.width; rh = r.height; rx = e.clientX; ry = e.clientY;
        modal.style.transition = 'none';
        e.preventDefault(); e.stopPropagation();
    });
    document.addEventListener('pointermove', e => {
        if (!resizing) return;
        const nw = Math.max(380, Math.min(window.innerWidth * 0.95, rw + (e.clientX - rx)));
        const nh = Math.max(320, Math.min(window.innerHeight * 0.9, rh + (e.clientY - ry)));
        modal.style.width = nw + 'px'; modal.style.height = nh + 'px';
    });
    document.addEventListener('pointerup', () => { resizing = false; modal.style.transition = ''; });

    // 关闭
    overlay.querySelector('#aiClose').addEventListener('click', closeAIModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeAIModal(); });

    // 新建对话
    overlay.querySelector('#aiNewChat').addEventListener('click', () => {
        aiChatHistory = [];
        document.getElementById('aiModalBody').innerHTML = '';
        sendAIMessage(buildAISystemPrompt(q), true);
    });

    // 发送
    const aiInput = overlay.querySelector('#aiInput');
    const aiSendBtn = overlay.querySelector('#aiSend');
    const doSend = () => {
        const txt = aiInput.value.trim();
        if (!txt) return;
        aiInput.value = '';
        aiInput.disabled = true; aiSendBtn.disabled = true;
        appendMessage('user', txt);
        aiChatHistory.push({ role: 'user', content: txt });
        sendAIMessage(txt, false);
    };
    aiSendBtn.addEventListener('click', doSend);
    aiInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });

    // 首次自动发起
    const initMsg = buildAISystemPrompt(q);
    aiChatHistory.push({ role: 'user', content: initMsg });
    sendAIMessage(initMsg, true);
}

function closeAIModal() {
    if (aiAbortCtrl) { aiAbortCtrl.abort(); aiAbortCtrl = null; }
    if (aiModalEl) { aiModalEl.remove(); aiModalEl = null; }
    aiCurrentQ = null;
}

function appendMessage(role, content) {
    if (!aiModalEl) return;
    const body = aiModalEl.querySelector('#aiModalBody');
    const div = document.createElement('div');
    div.className = 'ai-msg ' + role;
    div.innerHTML = '<div class="label">' + (role === 'assistant' ? 'AI' : '你') + '</div>' + content.replace(/\n/g, '<br>');
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
}

async function sendAIMessage(content, isSystemInit) {
    if (!aiModalEl) return;
    const body = aiModalEl.querySelector('#aiModalBody');
    const aiSendBtn = aiModalEl.querySelector('#aiSend');
    const aiInput = aiModalEl.querySelector('#aiInput');

    const msgDiv = document.createElement('div');
    msgDiv.className = 'ai-msg assistant streaming';
    msgDiv.innerHTML = '<div class="label">AI</div>';
    body.appendChild(msgDiv);
    body.scrollTop = body.scrollHeight;

    try {
        if (aiAbortCtrl) aiAbortCtrl.abort();
        aiAbortCtrl = new AbortController();

        const messages = [
            { role: 'system', content: '你是专业的刷题辅导助手，用中文回答，结构清晰，逐选项分析。' }
        ];
        if (isSystemInit) {
            messages.push({ role: 'user', content: content });
        } else {
            const sysMsg = aiChatHistory[0];
            if (sysMsg && sysMsg.role === 'user') messages.push(sysMsg);
            for (let i = 1; i < aiChatHistory.length; i++) messages.push(aiChatHistory[i]);
        }

        let url = aiConfig.baseURL;
        // 智能拼接：如果已含 /chat/completions 或 /completions 则不再追加
        if (!url.includes('/chat/completions') && !url.includes('/completions')) {
            url = url.replace(/\/+$/, '') + '/chat/completions';
        }

        const headers = { 'Content-Type': 'application/json' };
        if (aiConfig.key) headers['Authorization'] = 'Bearer ' + aiConfig.key;

        let resp;
        try {
            resp = await fetch(url, {
                method: 'POST',
                headers,
                body: JSON.stringify({ model: aiConfig.model, messages, stream: true }),
                signal: aiAbortCtrl.signal,
                mode: 'cors'
            });
        } catch (fetchErr) {
            if (fetchErr.name === 'AbortError') throw fetchErr;
            msgDiv.classList.remove('streaming');
            msgDiv.innerHTML = '<div class="label">AI</div>❌ 请求发送失败（Failed to fetch）。可能原因：<br>1. <b>CORS 跨域限制</b> — 该 API 服务商不允许浏览器直接调用，请考虑使用代理模式或支持 CORS 的服务<br>2. <b>地址错误</b> — 请检查 API 地址是否正确（需包含 http/https）<br>3. <b>网络不通</b> — 检查网络连接或 VPN';
            throw fetchErr;
        }

        if (!resp.ok) {
            const errText = await resp.text().catch(() => '');
            let errMsg = `请求失败 (${resp.status})`;
            if (resp.status === 401 || resp.status === 403) errMsg += '：API Key 无效，请检查配置';
            else if (resp.status === 404) errMsg += '：接口地址或模型名错误';
            else if (errText && errText.length < 300) errMsg += '：' + errText;
            msgDiv.classList.remove('streaming');
            msgDiv.innerHTML = '<div class="label">AI</div>❌ ' + errMsg;
            throw new Error(errMsg);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let timeoutId;

        const resetTimeout = () => {
            if (timeoutId) clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                if (aiAbortCtrl) aiAbortCtrl.abort();
            }, 30000);
        };
        resetTimeout();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            resetTimeout();
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = line.slice(6).trim();
                    if (data === '[DONE]') continue;
                    try {
                        const json = JSON.parse(data);
                        const delta = json.choices?.[0]?.delta?.content;
                        if (delta) {
                            fullText += delta;
                            msgDiv.innerHTML = '<div class="label">AI</div>' + fullText.replace(/\n/g, '<br>');
                            body.scrollTop = body.scrollHeight;
                        }
                    } catch (e) {}
                }
            }
        }
        if (timeoutId) clearTimeout(timeoutId);

        msgDiv.classList.remove('streaming');
        if (!fullText) {
            msgDiv.innerHTML = '<div class="label">AI</div>⚠️ 未收到有效回复';
        } else {
            aiChatHistory.push({ role: 'assistant', content: fullText });
        }
    } catch (e) {
        if (e.name === 'AbortError') {
            if (msgDiv.classList.contains('streaming')) {
                msgDiv.classList.remove('streaming');
                const current = msgDiv.innerHTML.replace(/<div class="label">AI<\/div>/, '');
                msgDiv.innerHTML = '<div class="label">AI</div>' + (current.trim() ? current + '<br><br>⚠️ 输出中断' : '⚠️ 请求已取消');
            }
        } else if (!msgDiv.innerHTML.includes('❌')) {
            msgDiv.classList.remove('streaming');
            msgDiv.innerHTML = '<div class="label">AI</div>❌ ' + e.message;
        }
    } finally {
        aiAbortCtrl = null;
        if (aiModalEl) {
            const s = aiModalEl.querySelector('#aiSend');
            const i = aiModalEl.querySelector('#aiInput');
            if (s) s.disabled = false;
            if (i) i.disabled = false;
            if (i) i.focus();
        }
    }
}
</script>
